<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Velvet Store — Template E-commerce</title>
    <!-- Font Awesome per le icone -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- CSS personalizzato -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="navbar">
    <a href="#" class="logo">GamboCeru<span>.</span></a>
    <div class="nav-icons">
        <div class="cart-icon-wrapper" id="cartToggleBtn">
            <i class="fas fa-shopping-bag"></i>
            <span id="cart-count">0</span>
        </div>
    </div>
</header>

<main class="container">
    <h1 class="section-title">✨ Nuovi arrivi</h1>
    <p style="margin-bottom: 1rem; color: var(--text-soft);">Scopri la collezione essenziale</p>

    <!-- Griglia Prodotti (renderizzata via JS) -->
    <div id="productsContainer" class="products-grid"></div>
</main>

<div class="footer-note">
    © 2026 Velvet Store — Template e-commerce reattivo
</div>

<!-- CARRELLO OVERLAY & DRAWER -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
        <h3>Il tuo carrello</h3>
        <button class="close-cart" id="closeCartBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="cart-items" id="cartItemsContainer">
        <!-- Elementi dinamici -->
        <div class="cart-empty-msg">Il carrello è vuoto</div>
    </div>
    <div class="cart-footer">
        <div class="cart-total">
            <span>Totale</span>
            <span id="cartTotalPrice">€0,00</span>
        </div>
        <button class="btn-checkout" id="checkoutBtn">Procedi al pagamento <i class="fas fa-arrow-right" style="margin-left: 6px;"></i></button>
    </div>
</div>

<!-- JavaScript esterno -->
<script src="./js/script.js"></script>
</body>
</html>
